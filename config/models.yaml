version: 1
models_directory: "./models"
defaults:
  n_ctx: 8192
  n_gpu_layers: 0
  temperature: 0.7
  top_p: 0.95
  max_tokens: 1024
  threads: 8
models:
  phi_3:
    file: "Phi-3.5-mini-instruct-Q5_K_M.gguf"
    huggingface_repo: "microsoft/Phi-3.5-mini-instruct"
    release_date: "2024-08"
    parameters_b: 3.8
    description: "Phi-3.5 Mini Instruct: компактная instruct-модель Microsoft, хорошо следует инструкциям, сильна в code/math для своего размера."
    quantization: "Q5_K_M"
    request_style: "openai_chat"
    required_for_base: true
    strip_reasoning: true
    overrides:
      n_ctx: 16384
      n_gpu_layers: 35

